# segment_length: number of steps per LLM evaluation segment (K).
# Controls temporal reward density — must be well below typical episode
# length to provide intra-episode reward variation for GAE.
# Must divide PPO's n_steps (default 2048).
# Crafter: K=64 gives ~2-3 segments per episode (~170 avg steps).
# MiniGrid: K=16 gives ~1-3 segments per episode (~20-50 steps).
defaults:
  llm_provider: "openrouter" # or "mistral"
  llm_temperature: 0.0
  seed: 42

envs:
  minigrid:
    env_string: "MiniGrid-Empty-5x5-v0"
    total_timesteps: 50000
    eval_freq: 2000
    n_eval_episodes: 25
    success_threshold: 0.90
    prompt_version: "v1"
    segment_length: 16

  crafter:
    env_string: "CrafterReward-v1"
    total_timesteps: 1000000
    eval_freq: 50000
    n_eval_episodes: 50
    prompt_version: "v1"
    segment_length: 64