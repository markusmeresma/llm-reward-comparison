  materials):\n- place_table: requires wood (enables pickaxe/sword crafting)\n- place_furnace:
  requires stone (enables stone/iron tool crafting)\n- place_plant: requires sapling
  (grows food source)\n- place_stone: requires stone (walls)\n\nCrafting (must be
  near the right workstation; actions silently fail if prerequisites not met):\n-
  wood_pickaxe / wood_sword: requires wood + nearby table\n- stone_pickaxe / stone_sword:
