  reasoning_summary: "Diagnosis from metrics: the agent reliably gets early easy achievements\
    \ (collect_sapling, collect_wood, place_plant, some drink/eat_cow) but almost\
    \ never crosses the first major bottleneck of the tech tree (make_wood_pickaxe)\
    \ and therefore never reaches collect_stone/coal/iron, place_furnace, stone/iron\
    \ tools, or late achievements. It also rarely achieves wake_up and almost never\
    \ defeats skeletons, suggesting weak night handling and insufficient weapon progression.\
    \ The current prompt is too generic and likely over-rewards \u201Cbusywork\u201D\
    \ (wood/sapling/planting, basic survival) because it calls those \u2018meaningful\
    \ progress\u2019 without emphasizing prerequisite chains or diminishing returns.\n\
    \nPrompt changes to address failures: (1) Make technology progression the highest-priority\
    \ scoring driver, with explicit high rewards for table -> wood_pickaxe -> stone\
    \ -> furnace -> coal/iron -> upgraded tools. (2) Add an explicit anti-reward-hacking\
    \ rule: repeating easy actions without escalation should score low (diminishing\
    \ returns), preventing the agent from farming wood/sapling/planting. (3) Keep\
    \ survival important but framed as enabling continued progress, not the main objective.\
    \ (4) Encourage night handling (wake_up/safe shelter) and combat wins when they\
    \ are sensible, while penalizing reckless damage/death. (5) Add a concrete numeric\
    \ rubric so the reward model uses the full range consistently and sharply distinguishes\
    \ tech leaps from stalling."
